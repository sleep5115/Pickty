# 선택 사항: PC 로컬 Postgres/Valkey (오프라인·장애 폴백).
# 공용 개발은 Lightsail Postgres 의 pickty_dev 등 + Valkey — 연결은 application-secrets / 환경 변수.
# 로컬 전용 비밀·OAuth 등은 application-local.yaml (gitignore).
#
# 사용: 루트에 `.env` 생성 (`.env.example` 참고) 후 `docker compose up -d`
# POSTGRES_PASSWORD 는 레포에 적지 말 것 — `.env` 만 (gitignore).
# 호스트 포트 **5442·6380** (컨테이너 내부는 5432·6379) — 호스트 기본 5432/6379와 겹치지 않게 고정.
# 기존에 호스트 5432 볼륨만 쓰던 PC는 `docker compose down` 후 볼륨 정리 또는 포트 변경에 맞게 재기동.

services:
  postgres:
    image: postgres:17
    container_name: pickty-postgres
    environment:
      POSTGRES_USER: pickty
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env — see .env.example}
      POSTGRES_DB: pickty
    ports:
      - "5442:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped

  valkey:
    image: valkey/valkey:9
    container_name: pickty-valkey
    ports:
      - "6380:6379"
    volumes:
      - valkeydata:/data
    restart: unless-stopped

volumes:
  pgdata:
  valkeydata:
