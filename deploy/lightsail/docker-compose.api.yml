# Lightsail: Postgres/Valkey 가 있는 Docker 네트워크에 API + Nginx(SSL 종료) 를 붙입니다.
#
# 사전 준비:
# 1) ~/pickty-infra 에서 postgres/valkey compose 기동(기존과 동일)
# 2) 이 디렉터리에 application-secrets.yaml 복사 (gitignore — 레포에 커밋 금지)
# 3) 이 디렉터리에 certs/cert.pem, certs/key.pem 배치 (Cloudflare Origin Certificate 등)
# 4) Lightsail 네트워킹에서 공인 노출 시 TCP 443 허용 (8080 은 외부 미개방)
#
# 실행(레포 루트에서): docker compose -f deploy/lightsail/docker-compose.api.yml up -d --build

services:
  pickty-api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    image: pickty-api:local
    container_name: pickty-api
    restart: unless-stopped
    environment:
      # 운영(Lightsail / pickty.app): 반드시 prod — pickty_prod DB·Valkey(prod) 사용
      SPRING_PROFILES_ACTIVE: prod
      # 컨테이너 간 통신 — DB 비번·OAuth 등은 마운트된 application-secrets.yaml 에만 둠
      DB_HOST: pickty-postgres
      VALKEY_HOST: pickty-valkey
      VALKEY_DATABASE: "0"
      # pickty-config 의 yaml 을 마운트할 때 나머지 OAuth·JWT·R2 등 로드
      SPRING_CONFIG_IMPORT: optional:file:/config/application-secrets.yaml
    volumes:
      - ./application-secrets.yaml:/config/application-secrets.yaml:ro
    networks:
      - pickty-infra_default

  nginx:
    image: nginx:alpine
    container_name: pickty-nginx
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - pickty-api
    networks:
      - pickty-infra_default

networks:
  pickty-infra_default:
    external: true
