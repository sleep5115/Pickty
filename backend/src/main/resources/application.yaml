server:
  port: 8080
  # 멀티파트 전체 본문 한도 — 미설정 시 Tomcat 기본(약 2MB)에서 먼저 413 발생할 수 있음
  tomcat:
    max-http-form-post-size: 80MB
    max-swallow-size: 80MB

spring:
  application:
    name: pickty-server

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 80MB

  config:
    import: optional:classpath:application-local.yaml

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/pickty
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${VALKEY_HOST:localhost}
      port: ${VALKEY_PORT:6379}
      password: ${VALKEY_PASSWORD:}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3002}
  oauth2:
    # 쉼표로 구분된 허용 프론트엔드 오리진 목록 (모바일 테스트 시 application-local.yaml에서 추가)
    allowed-frontend-origins: "http://localhost:3002"

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-seconds: 3600
  refresh-token-expiration-seconds: 604800

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
