# 공통 기본값. 프로필 (단일 Postgres 인스턴스에 pickty / pickty_dev / pickty_prod):
# - dev (기본): application-dev.yaml + gitignore application-secrets.yaml(DB_HOST·VALKEY_HOST·OAuth 등)
# - local: gitignore application-local.yaml — 보통 Lightsail pickty_dev + secrets (선택 Docker 폴백은 compose)
# - prod: application-prod.yaml + env

server:
  port: 8080
  # 멀티파트 본문 한도 — Nginx·Spring multipart·Tomcat 커넥터와 동일 수치(8MB)로 통일
  tomcat:
    max-http-form-post-size: 8MB
    max-swallow-size: 8MB

spring:
  application:
    name: pickty-server

  profiles:
    default: dev

  servlet:
    multipart:
      max-file-size: 8MB
      max-request-size: 8MB

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            # 카카오 콘솔에서 프로필 사진은 선택 동의로 두더라도, 여기에 profile_image 를 넣으면
            # 로그인 시마다 해당 항목 동의 UI가 뜬다. 닉네임·이메일만 쓰면 스코프에서 빼도 됨.
            scope:
              - profile_nickname
              - account_email
            client-name: Kakao
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            scope:
              - nickname
              - email
              - profile_image
            client-name: Naver
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            # 네이버는 id·nickname 등이 최상위가 아니라 response 맵 안에 있음. Spring 이 필수 user name 으로
            # Map 전체를 쓰면 toString() 이 되지만, 이후 PrincipalDetails 가 userId 로 getName() 을 대체함.
            user-name-attribute: response

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# 이미지 저장소(Cloudflare R2, S3 호환): bucket-name·access-key·secret-key·endpoint·public-url
# 값은 gitignore application-secrets.yaml 또는 배포 환경 변수(CLOUD_CLOUDFLARE_R2_*) 로 주입.

app:
  frontend-url: ${FRONTEND_URL}
  auth:
    refresh-cookie:
      # HTTPS API 기준. 로컬 http://localhost:8080 만 쓸 때는 secrets 에서 secure: false 권장
      secure: true
      same-site: Lax
      # 비우면 호스트 전용(api.pickty.app). 서브도메인 공유 시 예: .pickty.app
      domain: ""
  oauth2:
    # 쉼표 구분. 운영: https://pickty.app — 로컬 Next(3002) 병행 시 secrets에서 함께 지정
    allowed-frontend-origins: "https://pickty.app,https://www.pickty.app,http://localhost:3002,http://127.0.0.1:3002"

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-seconds: 3600
  refresh-token-expiration-seconds: 604800

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
