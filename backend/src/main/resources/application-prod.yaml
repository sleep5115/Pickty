# prod — Spring·Postgres·Valkey 동일 호스트(또는 compose). 플레이스홀더 기본값 없음.
# 서버 환경변수로 DB_HOST, DB_PORT, DB_USERNAME, DB_PASSWORD, VALKEY_* , JWT_SECRET, GOOGLE_* , FRONTEND_URL 등 주입.

server:
  forward-headers-strategy: native

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/pickty_prod
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  data:
    redis:
      host: ${VALKEY_HOST}
      port: ${VALKEY_PORT}
      password: ${VALKEY_PASSWORD}
      database: ${VALKEY_DATABASE}

logging:
  level:
    root: INFO
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
