# =============================================================================
# 샘플 — 실제 값은 gitignore `application-secrets.yaml` 에만 두고 pickty-config 에서 복사.
# Spring: spring.config.import: optional:classpath:application-secrets.yaml
# =============================================================================
#
# 아래 키는 application.yaml 이 ${VAR} 로 참조합니다. 필요 시 이 파일에 넣거나 OS/IDE 환경변수로 주입하세요.
#
# | 플레이스홀더 | 용도 |
# |--------------|------|
# | GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET | Google OAuth2 (웹 클라이언트) |
# | KAKAO_CLIENT_ID / KAKAO_CLIENT_SECRET | Kakao REST API 키(네이티브 앱 키 + 코드로 받은 Client Secret) |
# | JWT_SECRET | HS256용 충분히 긴 비밀값 |
# | FRONTEND_URL | OAuth 성공 후 기본 리다이렉트 (예: https://pickty.app) |
# | DB_* / VALKEY_* | 데이터소스·캐시 (dev/local 프로필과 함께 사용) |
#
# Kakao Developers → 앱 → 플랫폼 Web → Redirect URI:
#   https://api.pickty.app/login/oauth2/code/kakao
#   http://localhost:8080/login/oauth2/code/kakao
#
# 예시(값은 절대 실제로 채우지 말 것):
#
# GOOGLE_CLIENT_ID: "your-google-client-id.apps.googleusercontent.com"
# GOOGLE_CLIENT_SECRET: "your-google-client-secret"
# KAKAO_CLIENT_ID: "your-kakao-rest-api-key"
# KAKAO_CLIENT_SECRET: "your-kakao-client-secret"
# JWT_SECRET: "your-jwt-secret-min-256-bits"
# FRONTEND_URL: "https://pickty.app"
